name: Daily PG forecast

on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC = 07:00 v ČR během letního času
    # V zimním čase to poběží v 06:00 českého času.
    - cron: "0 5 * * *"

permissions:
  contents: write

concurrency:
  group: daily-pg-forecast
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily forecast for web
        run: python scripts/run_daily_forecast.py --config config/locations.json --days 3

      - name: Build static website data
        run: python scripts/build_web.py --config config/locations.json --days 3

      - name: Commit generated forecast data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/forecasts docs/data

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            exit 0
          fi

          git commit -m "Update daily PG forecast"

          git pull --rebase origin main
          git push origin main
