name: Daily PG forecast

on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC = 07:00 v ČR během letního času
    # V zimním čase to poběží v 06:00 českého času.
    - cron: "0 5 * * *"

permissions:
  contents: write

concurrency:
  group: daily-pg-forecast
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily forecast for web
        run: python scripts/run_daily_forecast.py --config config/locations.json --days 3

      - name: Build static website data
        run: python scripts/build_web.py --config config/locations.json --days 3

      - name: Commit generated data and website
        run: |
          set -euo pipefail
          # Determine current branch name
          BRANCH=${GITHUB_REF##*/}
          if [[ -n "$(git status --porcelain data/forecasts data/validation docs/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/forecasts docs/data
            if [[ -d data/validation ]]; then
              git add data/validation
            fi
            # Commit if there are staged changes
            if git diff --cached --quiet; then
              echo "No staged changes to commit."
            else
              git commit -m "Add daily PG forecast data and website payload"
            fi

            # Ensure we have the latest remote and rebase to avoid non-fast-forward pushes
            git fetch origin "$BRANCH"
            # Try a fast push; if rejected, rebase onto remote then push again
            if ! git push origin "$BRANCH"; then
              echo "Push failed; attempting to rebase on origin/$BRANCH and push again."
              git rebase "origin/$BRANCH" || (git rebase --abort && echo "Rebase failed; aborting commit step." && exit 1)
              git push origin "$BRANCH"
            fi
          else
            echo "No generated data changes to commit."
          fi
