name: Daily PG forecast
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  forecast:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run daily forecast for web
        run: python scripts/run_daily_forecast.py --config config/locations.json --days 3
      - name: Build static website data
        run: python scripts/build_web.py --config config/locations.json --days 3
      - name: Validate yesterday
        run: python scripts/validate_yesterday.py --config config/locations.json
      - name: Commit generated data and website
        run: |
          if [[ -n "$(git status --porcelain data/forecasts data/validation docs/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/forecasts docs/data
            if [[ -d data/validation ]]; then
              git add data/validation
            fi
            git commit -m "Add daily PG forecast data and website payload"
            git push
          else
            echo "No generated data changes to commit."
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
