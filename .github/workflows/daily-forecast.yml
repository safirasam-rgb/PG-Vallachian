name: Daily PG forecast

on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC = 07:00 v ČR během letního času
    # V zimním čase to poběží v 06:00 českého času.
    - cron: "0 5 * * *"

permissions:
  contents: write

concurrency:
  group: daily-pg-forecast
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily forecast for web
        run: python scripts/run_daily_forecast.py --config config/locations.json --days 3

      - name: Build static website data
        run: python scripts/build_web.py --config config/locations.json --days 3

      - name: Commit and push generated forecast data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/forecasts data/validation docs/data

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update daily PG forecast"

          # Jednoduchá retry logika
          for attempt in {1..5}; do
            echo "Push attempt $attempt/5"
            git fetch origin main
            git rebase origin/main
            if git push origin main; then
              echo "Successfully pushed"
              exit 0
            fi
            if [ $attempt -lt 5 ]; then
              echo "Attempt $attempt failed, waiting 10 seconds..."
              sleep 10
            fi
          done

          echo "Failed to push after 5 attempts"
          exit 1
