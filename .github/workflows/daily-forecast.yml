name: Daily PG forecast

on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC = 07:00 v ČR během letního času
    # V zimním čase to poběží v 06:00 českého času.
    - cron: "0 5 * * *"

permissions:
  contents: write

concurrency:
  group: daily-pg-forecast
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily forecast for web
        run: python scripts/run_daily_forecast.py --config config/locations.json --days 3

      - name: Build static website data
        run: python scripts/build_web.py --config config/locations.json --*
